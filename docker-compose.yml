version: '3.8'

services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_BACKEND_URL=http://localhost:3000
    depends_on:
      - backend

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - PYTHON_SERVICE_URL=http://python_service:8000
      - DATABASE_URL=${DATABASE_URL}
      - DIRECT_URL=${DIRECT_URL}
      - ECOURTS_MCP_TOKEN=${ECOURTS_MCP_TOKEN}
    depends_on:
      - python_service

  python_service:
    build:
      context: ./apps/python_service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./apps/python_service:/app
